name: CI/CD - Deploy to AWS EC2

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (skip tests)
        run: ./gradlew bootJar -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/attune:latest
            ${{ secrets.DOCKER_USERNAME }}/attune:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            # 환경변수 파일 생성 (권한 제한)
            cat > /home/${{ secrets.EC2_USERNAME }}/.attune.env << 'EOF'
            SPRING_PROFILES_ACTIVE=prod
            SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}
            SPRING_MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
            JWT_ACCESS_TOKEN_EXPIRATION=${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION }}
            JWT_REFRESH_TOKEN_EXPIRATION=${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION }}
            APP_FRONTEND_URL=${{ secrets.APP_FRONTEND_URL }}
            EOF
            chmod 600 /home/${{ secrets.EC2_USERNAME }}/.attune.env

            # Docker Hub 로그인
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 최신 이미지 Pull
            docker pull ${{ secrets.DOCKER_USERNAME }}/attune:latest

            # 기존 컨테이너 중지 및 제거
            docker stop attune 2>/dev/null || true
            docker rm attune 2>/dev/null || true

            # 컨테이너 실행
            docker run -d \
              --name attune \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /var/log/attune-me:/var/log/attune-me \
              --env-file /home/${{ secrets.EC2_USERNAME }}/.attune.env \
              ${{ secrets.DOCKER_USERNAME }}/attune:latest

            # 오래된 이미지 정리
            docker image prune -f

            echo "배포 완료: $(date)"
