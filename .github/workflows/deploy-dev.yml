name: Attune Backend Dev Deploy

on:
  push:
    branches: [ "develop" ] # develop 브랜치에 푸시될 때 작동

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # 1. secrets에 저장된 yml 내용을 빌드 환경 내에 실제 파일로 생성하는 단계
      - name: Make application-secret.yml
        run: |
                 mkdir -p ./src/main/resources
                 echo "${{ secrets.APPLICATION_SECRET_YML }}" | base64 --decode > ./src/main/resources/application-secret.yml
        shell: bash


        # 2. 파일이 잘 만들어졌으니 이제 안심하고 빌드 진행
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 빌드 및 푸시 (태그를 :dev 로 지정)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: hannah098/attune-be:dev

      # 개발 서버(DEV)에 접속해서 컨테이너 교체
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USERNAME }}
          key: ${{ secrets.DEV_EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker stop attune-dev-apps || true
            docker rm attune-dev-apps || true
            docker system prune -f
            docker pull hannah098/attune-be:dev
            # 컨테이너 이름을 dev용으로 구분하여 실행
            docker run -d --name attune-dev-apps -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=dev \
              hannah098/attune-be:dev