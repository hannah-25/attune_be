# Local 환경 설정 (H2 Database 사용)
spring:
  # H2 Database 설정

  datasource:
    url: jdbc:h2:mem:attune_local
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true


# 개발용 로깅 설정
logging:
  level:
    com.attune : DEBUG
    org.hibernate.sql: DEBUG


# API 서버 URL 설정
api:
  server:
    url: http://localhost:8080
    description: Local Development Server