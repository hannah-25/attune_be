# Dev 환경 설정 (개발 서버용, MySQL 8.4.x)
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true


# 개발 서버 로깅 설정
logging:
  level:
    root: INFO
    attune: DEBUG # 내 코드: 디버그 로그
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG        # SQL문 보기
    org.springframework.security: INFO


# 개발 서버 CORS
cors:
  allowed-origin-patterns:
    - "https://dev.attune-me.com"
    - "https://*.dev.attune-me.com"