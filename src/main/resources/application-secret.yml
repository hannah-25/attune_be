  cloud:
    aws:
      credentials:
        access-key:
        secret-key:
      region:
        static:
      s3:
        bucket:
      ses:
        from-email:


  security:
    oauth2:
      client:
        registration:
          google:
            client-id:
            client-secret:
            scope: openid,profile,email
            redirect-uri: "${oauth2.base-url}/oauth/redirect/google"
          kakao:
            client-id:
            client-secret:
            scope: profile_nickname,account_email
            authorization-grant-type: authorization_code
            redirect-uri: "${oauth2.base-url}/oauth/redirect/kakao"
        provider:
          kakao:
            authorization-uri:
            token-uri:
            user-info-uri:
            user-name-attribute: id
  schedule:
    pool-size: 10



