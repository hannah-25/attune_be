spring:
  config:
    import: []  # application-secret.yml 미사용

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret-key: test-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 1800
  refresh-token-expiration: 1209600

cors:
  allowed-origin-patterns:
    - "http://localhost:*"

app:
  frontend-url: http://localhost:3000
